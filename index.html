<!-- This visualization is intentionally frozen in its current form. -->
<!-- Further complexity is possible, but not necessary. -->

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy</title>
    <link rel="stylesheet" href="./main.css">
    <link rel="stylesheet" href="./slider-module/slider.css">
    <link rel="icon" type="image/x-icon" href="./gopher.ico">
</head>

<body>
    <svg class="squircle-clip" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <clipPath id="squircle-uid" clipPathUnits="objectBoundingBox">
                <path
                    d="M 0.053,0
                    C 0.029,0 0.012,0.008 0.005,0.02
                    C 0.002,0.028 0,0.038 0,0.053
                    L 0,0.947
                    C 0,0.962 0.002,0.972 0.005,0.98
                    C 0.012,0.992 0.029,1 0.053,1
                    L 0.947,1
                    C 0.971,1 0.988,0.992 0.995,0.98
                    C 0.998,0.972 1,0.962 1,0.947
                    L 1,0.053
                    C 1,0.038 0.998,0.028 0.995,0.02
                    C 0.988,0.008 0.971,0 0.947,0
                    Z" />
            </clipPath>
            <clipPath id="squircle-track-uid" clipPathUnits="objectBoundingBox">
                <path
                    d="M 0.033,0
                    C 0.018,0 0.007,0.012 0.003,0.035
                    C 0.001,0.055 0,0.1 0,0.15
                    L 0,0.85
                    C 0,0.9 0.001,0.945 0.003,0.965
                    C 0.007,0.988 0.018,1 0.033,1
                    L 0.967,1
                    C 0.982,1 0.993,0.988 0.997,0.965
                    C 0.999,0.945 1,0.9 1,0.85
                    L 1,0.15
                    C 1,0.1 0.999,0.055 0.997,0.035
                    C 0.993,0.012 0.982,0 0.967,0
                    Z" />
            </clipPath>
        </defs>
    </svg>
    
    <div id="ui-container" class="glass-panel" style="pointer-events: none;">
        <div class="avatar">
            <img src="https://github.com/Julian-Meng.png" alt="">
        </div>
        <h1>Created By Julian Meng</h1>
        <a href="https://github.com/Julian-Meng" target="_blank" style="pointer-events: auto;">HomePage</a>
    </div>

    <div id="slider-container" class="card-shadow">
        <div class="card" style="clip-path: url(#squircle-uid);">
            <div class="header">
                <div class="header-left">
                    <span class="label-text">Speed</span>
                    <span class="status-text">Normal</span>
                </div>
            </div>

            <div class="scale-labels">
                <span>Slower</span>
                <span>Faster</span>
            </div>

            <div class="track-wrapper" style="clip-path: url(#squircle-track-uid);">
                <div class="track-bg"></div>
                <div class="dots-layer">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <canvas></canvas>
                <input type="range" min="0" max="100" value="33" />
            </div>
        </div>
    </div>

    <div id="instructions">
        <p class="instructions-zh">滚轮缩放，左键移动</p>
        <p class="instructions-en">Scroll to zoom, press left button to move.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="./main.js"></script>
</body>

</html>
